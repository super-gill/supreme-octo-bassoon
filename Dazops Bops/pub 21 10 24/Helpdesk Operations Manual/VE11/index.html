<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Helpdesk Operations Manual</title>

  <!-- Markdown parser: converts .md content into HTML -->
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>

  <!-- Anchor plugin for markdown-it: auto-generates heading IDs for deep linking -->
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-anchor@9.1.0/dist/markdownItAnchor.umd.js"></script>

  <!-- PDF generation libraries: html2pdf wraps html2canvas + jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <!-- Favicon -->
  <link rel="icon" type="image/svg" href="digitalOranges.svg">
</head>

<!-- Stylesheet for the app layout, sidebar, document viewer, and PDF export -->
<link rel="stylesheet" type="text/css" href="styles.css">

<body>
  <!-- Root layout: two-column grid (sidebar | main content) -->
  <div class="app">

    <!-- ===== SIDEBAR ===== -->
    <aside>

      <!-- Branding: document title and classification label -->
      <div class="brand">
        <strong id="docTitle">Helpdesk Operations Manual</strong>
        <span id="docMeta">Internal Use Only</span>
      </div>

      <!-- Book selector: dropdown populated from books.json, switches between manuals -->
      <div class="book-select">
        <select id="bookPicker"></select>
      </div>

      <!-- Search: filters policies by keyword, results appear below the input -->
      <div class="search">
        <input id="search" type="search" placeholder="Search the manual…" autocomplete="off" />
        <div id="results" class="results"></div>
      </div>

      <!-- Navigation: dynamically built list of H1 groups and H2 policy links -->
      <div id="nav"></div>

      <!-- Platform version footer: populated by JS from PLATFORM_VERSION constant -->
      <div class="sidebar-footer">
        <span id="platformVersion"></span>
        <!-- Theme toggle: cycles light/dark/system, stored in localStorage -->
        <button id="themeToggle" class="theme-toggle" type="button" title="Toggle theme"></button>
      </div>
    </aside>

    <!-- ===== MAIN CONTENT AREA ===== -->
    <main>
      <div class="wrap">
        <div class="card">

          <!-- Top bar: breadcrumb meta text + export buttons -->
          <div class="meta-bar">
            <!-- Breadcrumb showing "H1 Section > H2 Policy" -->
            <div class="meta" id="meta"></div>

            <!-- PDF export actions -->
            <div class="meta-actions">
              <button id="exportPdf" class="btn" type="button" title="Export this policy to PDF">Export PDF</button>
              <button id="exportManualPdf" class="btn" type="button" title="Export Full Manual to PDF">Export Full
                Manual (PDF)</button>
            </div>
          </div>

          <!-- Rendered markdown content for the currently selected policy -->
          <article class="doc" id="view"></article>
        </div>
      </div>
    </main>
  </div>

  <!-- Back to top button: appears when main content is scrolled down -->
  <button id="backToTop" class="back-to-top" type="button" title="Back to top">&#8679;</button>
</body>

<!-- Application logic: markdown parsing, navigation, search, PDF export -->
<script src="index.js"></script>

</html>
